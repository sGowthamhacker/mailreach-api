[build]
buildCommand = "apt-get install -y libglib2.0-0 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libxkbcommon0 libpango-1.0-0 libcairo2 libasound2 libatspi2.0-0 && pip install -r requirements.txt && python -m playwright install chromium"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"